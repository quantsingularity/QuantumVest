global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "quantumvest-backend"
    static_configs:
      - targets: ["backend:9090"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "quantumvest-frontend"
    static_configs:
      - targets: ["frontend:80"]
    metrics_path: "/metrics"
    scrape_interval: 30s

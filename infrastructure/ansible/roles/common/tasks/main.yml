---
- name: Update all packages
  ansible.builtin.yum:
    name: "*"
    state: latest
    update_only: true
  when: ansible_os_family == "RedHat"

- name: Update all packages (Debian)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install common packages (RedHat)
  ansible.builtin.yum:
    name:
      - vim
      - git
      - wget
      - unzip
      - htop
      - net-tools
      - python3
      - python3-pip
    state: present
  when: ansible_os_family == "RedHat"

- name: Install common packages (Debian)
  ansible.builtin.apt:
    name:
      - vim
      - git
      - wget
      - unzip
      - htop
      - net-tools
      - python3
      - python3-pip
    state: present
  when: ansible_os_family == "Debian"

- name: Set timezone
  community.general.timezone:
    name: UTC

- name: Configure firewall (RedHat)
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
  loop:
    - http
    - https
    - ssh
  when: ansible_os_family == "RedHat"

- name: Start and enable firewalld (RedHat)
  ansible.builtin.systemd:
    name: firewalld
    state: started
    enabled: true
  when: ansible_os_family == "RedHat"

- name: Ensure NTP is configured
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: true
  when: ansible_os_family == "RedHat"
  ignore_errors: true

- name: Set ulimits for application user
  community.general.pam_limits:
    domain: "*"
    limit_type: "{{ item.type }}"
    limit_item: "{{ item.item }}"
    value: "{{ item.value }}"
  loop:
    - { type: soft, item: nofile, value: "65536" }
    - { type: hard, item: nofile, value: "65536" }

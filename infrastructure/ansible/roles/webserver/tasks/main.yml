---
- name: Install web server packages
  ansible.builtin.yum:
    name:
      - nginx
      - nodejs
      - npm
    state: present

- name: Create web application directory
  ansible.builtin.file:
    path: "/var/www/{{ app_name }}"
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"

- name: Configure Nginx
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "/etc/nginx/conf.d/{{ app_name }}.conf"
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c /etc/nginx/nginx.conf
  notify: Restart Nginx

- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Configure logrotate for nginx
  ansible.builtin.copy:
    dest: /etc/logrotate.d/nginx-app
    content: |
      /var/log/nginx/*.log {
        daily
        rotate 14
        compress
        delaycompress
        missingok
        notifempty
        sharedscripts
        postrotate
          nginx -s reopen
        endscript
      }
    mode: "0644"

appName: quantumvest
namespace: quantumvest-production
environment: prod

backend:
  replicas: 5
  image:
    repository: registry.example.com/app/backend
    tag: production
    pullPolicy: Always
  containerPort: 8080
  servicePort: 80
  metrics:
    port: 9090
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
      storage: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
      storage: 1Gi
  autoscaling:
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  deployment:
    maxSurge: "25%"
    maxUnavailable: "0"
  probes:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
  apiUrl: http://quantumvest-backend
  jwtSecret: ""
  apiKey: ""
  encryptionKey: ""
  apiKeyHash: ""
  logLevel: warn
  terminationGracePeriodSeconds: 60

frontend:
  replicas: 5
  image:
    repository: registry.example.com/app/frontend
    tag: production
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    minReplicas: 5
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

database:
  replicas: 3
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: quantumvestdb
  user: appuser
  storageClass: premium-rwo
  storage: 50Gi
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 4Gi

redis:
  replicas: 3
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: premium-rwo
  storage: 20Gi
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

ingress:
  host: quantumvest.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-prod

vault:
  address: https://vault.quantumvest.com
  image:
    tag: "1.15.2"

logLevel: warn
imagePullSecrets: regcred

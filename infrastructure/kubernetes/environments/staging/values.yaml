appName: quantumvest
namespace: quantumvest-staging
environment: staging

backend:
  replicas: 3
  image:
    repository: registry.example.com/app/backend
    tag: stable
    pullPolicy: Always
  containerPort: 8080
  servicePort: 80
  metrics:
    port: 9090
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
      storage: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
      storage: 512Mi
  autoscaling:
    minReplicas: 3
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  deployment:
    maxSurge: "25%"
    maxUnavailable: "25%"
  probes:
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startup:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
  apiUrl: http://quantumvest-backend
  jwtSecret: ""
  apiKey: ""
  encryptionKey: ""
  apiKeyHash: ""
  logLevel: info
  terminationGracePeriodSeconds: 30

frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  autoscaling:
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

database:
  replicas: 1
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: quantumvestdb
  user: appuser
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi

redis:
  replicas: 2
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi

ingress:
  host: staging.quantumvest.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging

vault:
  address: https://vault.example.com
  image:
    tag: "1.15.2"

logLevel: info
imagePullSecrets: regcred

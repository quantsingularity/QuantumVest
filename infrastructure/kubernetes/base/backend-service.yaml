apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.appName }}-backend"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-backend"
    tier: backend
    component: api
    environment: "{{ .Values.environment }}"
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.backend.metrics.port | default 9090 }}"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: { { .Values.backend.servicePort } }
      targetPort: { { .Values.backend.containerPort } }
      protocol: TCP
      name: http
    - port: { { .Values.backend.metrics.port | default 9090 } }
      targetPort: { { .Values.backend.metrics.port | default 9090 } }
      protocol: TCP
      name: metrics
  selector:
    app: "{{ .Values.appName }}-backend"

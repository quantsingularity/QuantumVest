apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.appName }}-database"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-database"
    tier: database
    component: mysql
    environment: "{{ .Values.environment }}"
spec:
  serviceName: "{{ .Values.appName }}-database"
  replicas: { { .Values.database.replicas } }
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-database"
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-database"
        tier: database
        component: mysql
        environment: "{{ .Values.environment }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: "{{ .Values.appName }}-database"
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: "{{ .Values.database.image.pullPolicy }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          ports:
            - name: mysql
              containerPort: { { .Values.database.containerPort } }
              protocol: TCP
          resources:
            limits:
              cpu: "{{ .Values.database.resources.limits.cpu }}"
              memory: "{{ .Values.database.resources.limits.memory }}"
            requests:
              cpu: "{{ .Values.database.resources.requests.cpu }}"
              memory: "{{ .Values.database.resources.requests.memory }}"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "{{ .Values.database.name }}"
            - name: MYSQL_USER
              value: "{{ .Values.database.user }}"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-password
          volumeMounts:
            - name: "{{ .Values.appName }}-database-data"
              mountPath: /var/lib/mysql
            - name: mysql-tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1' --silent"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
      volumes:
        - name: mysql-tmp
          emptyDir:
            sizeLimit: 100Mi
  volumeClaimTemplates:
    - metadata:
        name: "{{ .Values.appName }}-database-data"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "{{ .Values.database.storageClass }}"
        resources:
          requests:
            storage: "{{ .Values.database.storage }}"

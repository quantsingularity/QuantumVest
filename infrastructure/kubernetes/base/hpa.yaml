apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: "{{ .Values.appName }}-backend-hpa"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-backend"
    environment: "{{ .Values.environment }}"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "{{ .Values.appName }}-backend"
  minReplicas: { { .Values.backend.autoscaling.minReplicas | default 2 } }
  maxReplicas: { { .Values.backend.autoscaling.maxReplicas | default 10 } }
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization:
            {
              {
                .Values.backend.autoscaling.targetCPUUtilizationPercentage | default 70,
              },
            }
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization:
            {
              {
                .Values.backend.autoscaling.targetMemoryUtilizationPercentage | default 80,
              },
            }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: "{{ .Values.appName }}-frontend-hpa"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-frontend"
    environment: "{{ .Values.environment }}"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "{{ .Values.appName }}-frontend"
  minReplicas: { { .Values.frontend.autoscaling.minReplicas | default 2 } }
  maxReplicas: { { .Values.frontend.autoscaling.maxReplicas | default 10 } }
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization:
            {
              {
                .Values.frontend.autoscaling.targetCPUUtilizationPercentage | default 70,
              },
            }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
      selectPolicy: Max

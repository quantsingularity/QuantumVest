apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.appName }}-config"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}"
data:
  API_URL: "{{ .Values.backend.apiUrl }}"
  REDIS_HOST: "{{ .Values.appName }}-redis"
  REDIS_PORT: "{{ .Values.redis.containerPort }}"
  DATABASE_HOST: "{{ .Values.appName }}-database"
  DATABASE_PORT: "{{ .Values.database.containerPort }}"
  DATABASE_NAME: "{{ .Values.database.name }}"
  DATABASE_USER: "{{ .Values.database.user }}"
  LOG_LEVEL: "{{ .Values.logLevel }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.appName }}-backend-config"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}"
    component: backend
data:
  API_URL: "{{ .Values.backend.apiUrl }}"
  REDIS_HOST: "{{ .Values.appName }}-redis"
  REDIS_PORT: "{{ .Values.redis.containerPort }}"
  DATABASE_HOST: "{{ .Values.appName }}-database"
  DATABASE_PORT: "{{ .Values.database.containerPort }}"
  DATABASE_NAME: "{{ .Values.database.name }}"
  DATABASE_USER: "{{ .Values.database.user }}"
  LOG_LEVEL: '{{ .Values.backend.logLevel | default "info" }}'
  METRICS_PORT: "{{ .Values.backend.metrics.port | default 9090 }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.appName }}-frontend-config"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}"
    component: frontend
data:
  API_URL: "{{ .Values.frontend.apiUrl }}"
  ENVIRONMENT: "{{ .Values.environment }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.appName }}-vault-config"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}"
    component: vault
data:
  agent.hcl: |
    vault {
      address = "{{ .Values.vault.address | default \"https://vault.quantumvest.com\" }}"
    }
    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "{{ .Values.appName }}-backend"
        }
      }
    }
    template {
      destination = "/vault/secrets/config"
      contents = "{{ `{{ with secret \"secret/{{ .Values.appName }}/backend\" }}{{ .Data.data | toJSON }}{{ end }}` }}"
    }
